<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода України</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
        .weather-tooltip {
            background: white;
            border: 1px solid #888;
            border-radius: 8px;
            padding: 3px 8px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 13px;
            white-space: nowrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }
        .weather-tooltip .city-name {
            font-weight: normal;
            font-size: 11px;
            display: block;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        var map = L.map('map', {
            minZoom: 1,
            maxZoom: 19
        }).setView([48.7, 31.5], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        var cities = [
            { name: "Луцк", lat: 50.7472, lon: 25.3254 },
            { name: "Ровно", lat: 50.6199, lon: 26.2516 },
            { name: "Житомир", lat: 50.2547, lon: 28.6587 },
            { name: "Львов", lat: 49.8397, lon: 24.0297 },
            { name: "Тернополь", lat: 49.5535, lon: 25.5948 },
            { name: "Ужгород", lat: 48.6208, lon: 22.2879 },
            { name: "Ивано-Франковск", lat: 48.9226, lon: 24.7111 },
            { name: "Хмельницкий", lat: 49.4229, lon: 26.9871 },
            { name: "Черновцы", lat: 48.2921, lon: 25.9358 },
            { name: "Винница", lat: 49.2331, lon: 28.4682 },
            { name: "Чернигов", lat: 51.4982, lon: 31.2893 },
            { name: "Сумы", lat: 50.9077, lon: 34.7981 },
            { name: "Киев", lat: 50.4501, lon: 30.5234 },
            { name: "Черкассы", lat: 49.4444, lon: 32.0598 },
            { name: "Полтава", lat: 49.5883, lon: 34.5514 },
            { name: "Харьков", lat: 49.9935, lon: 36.2304 },
            { name: "Кропивницкий", lat: 48.5079, lon: 32.2623 },
            { name: "Днепр", lat: 48.4647, lon: 35.0462 },
            { name: "Запорожье", lat: 47.8388, lon: 35.1396 },
            { name: "Луганск", lat: 48.5740, lon: 39.3078 },
            { name: "Николаев", lat: 46.9750, lon: 31.9946 },
            { name: "Херсон", lat: 46.6354, lon: 32.6169 },
            { name: "Донецк", lat: 48.0159, lon: 37.8028 },
            { name: "Одесса", lat: 46.4825, lon: 30.7233 },
            { name: "Симферополь", lat: 44.9521, lon: 34.1024 }
        ];

        function getWeatherIcon(code) {
            if (code === 0 || code === 1) return "☀️";
            if (code === 2) return "⛅";
            if (code === 3) return "☁️";
            if (code === 45 || code === 48) return "🌫️";
            if (code >= 51 && code <= 65) return "🌧️";
            if (code === 71 || code === 73 || code === 75) return "❄️";
            if (code === 80 || code === 81 || code === 82) return "🌧️";
            if (code === 95) return "⛈️";
            return "☁️";
        }

        var markers = {};

        cities.forEach(function(city) {
            var marker = L.marker([city.lat, city.lon]).addTo(map);

            marker.bindTooltip(
                "⏳ Загрузка...",
                {
                    permanent: true,
                    direction: "top",
                    className: "weather-tooltip",
                    offset: [0, -10]
                }
            );

            markers[city.name] = marker;
        });

        cities.forEach(function(city) {
            var url = "https://api.open-meteo.com/v1/forecast?latitude=" + city.lat +
                       "&longitude=" + city.lon +
                       "&daily=temperature_2m_max,temperature_2m_min,weathercode" +
                       "&timezone=Europe/Kyiv";

            fetch(url)
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    var dayTemp = Math.round(data.daily.temperature_2m_max[1]);
                    var nightTemp = Math.round(data.daily.temperature_2m_min[1]);
                    var code = data.daily.weathercode[1];
                    var icon = getWeatherIcon(code);

                    var tooltipHtml =
                        icon + " +" + dayTemp + "°" +
                        "<span class='city-name'>" + city.name + "</span>";

                    markers[city.name].setTooltipContent(tooltipHtml);

                    markers[city.name].bindPopup(
                        city.name + "<br>Днём: " + dayTemp + "°<br>Ночью: " + nightTemp + "°"
                    );
                })
                .catch(function(error) {
                    console.log("Ошибка погоды для " + city.name + ":", error);
                    markers[city.name].setTooltipContent("⚠️ ошибка");
                });
        });
    </script>

</body>
</html>
