<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода України</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        #map {
            width: 100%;
            height: 100vh;
            background: #1a1a1a;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        var ukraineBounds = [
            [44.0, 21.5],
            [52.5, 40.5]
        ];

        var map = L.map('map', {
            maxBounds: ukraineBounds,
            maxBoundsViscosity: 1.0,
            minZoom: 6,
            zoomAnimation: false,
            fadeAnimation: false,
            markerZoomAnimation: false,
            preferCanvas: true
        });

        map.fitBounds(ukraineBounds);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        L.marker([50.4501, 30.5234]).addTo(map)
            .bindPopup("Киев");

        var outerRing = [
            [30.0, 5.0], [30.0, 60.0], [65.0, 60.0], [65.0, 5.0], [30.0, 5.0]
        ];

        var worldWithHole = {
            "type": "Feature",
            "properties": {},
            "geometry": {
                "type": "Polygon",
                "coordinates": [
                    outerRing.map(function(c) { return [c[1], c[0]]; })
                ]
            }
        };

        fetch('https://raw.githubusercontent.com/georgique/world-geojson/main/countries/ukraine.json')
            .then(response => response.json())
            .then(ukraineData => {
                worldWithHole.geometry.coordinates.push(
                    ukraineData.features[0].geometry.coordinates[0]
                );

                L.geoJSON(worldWithHole, {
                    renderer: L.canvas({ padding: 5 }),
                    style: {
                        fillColor: "#1a1a1a",
                        fillOpacity: 1,
                        stroke: false
                    }
                }).addTo(map);
            })
            .catch(error => {
                console.log("Ошибка загрузки контура Украины:", error);
            });
    </script>

</body>
</html>
