<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода України</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        #map {
            width: 100%;
            height: 100vh;
            background: #cfe3ec;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        var ukraineBounds = [
            [43.5, 19.5],
            [53.0, 41.0]
        ];

        var map = L.map('map', {
            maxBounds: ukraineBounds,
            maxBoundsViscosity: 0.7,
            minZoom: 6
        });

        map.fitBounds([[44.0, 21.5], [52.5, 40.5]]);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        L.marker([50.4501, 30.5234]).addTo(map)
            .bindPopup("Киев");
    </script>

</body>
</html>
