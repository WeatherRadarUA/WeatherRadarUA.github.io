<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода України</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        var map = L.map('map').setView([48.5, 31.5], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        L.marker([50.4501, 30.5234]).addTo(map)
            .bindPopup("Киев");
        var worldWithHole = {
            "type": "Feature",
            "properties": {},
            "geometry": {
                "type": "Polygon",
                "coordinates": [
                    [[-180, -90], [-180, 90], [180, 90], [180, -90], [-180, -90]]
                ]
            }
        };

        fetch('https://raw.githubusercontent.com/georgique/world-geojson/main/countries/ukraine.json')
            .then(response => response.json())
            .then(ukraineData => {
                worldWithHole.geometry.coordinates.push(
                    ukraineData.features[0].geometry.coordinates[0]
                );

                L.geoJSON(worldWithHole, {
                    style: {
                        fillColor: "#1a1a1a",
                        fillOpacity: 1,
                        stroke: false
                    }
                }).addTo(map);
            })
            .catch(error => {
                console.log("Ошибка загрузки контура Украины:", error);
            });
    </script>

</body>
</html>
